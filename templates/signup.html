{% extends "base.html" %}
{% block title %}Sign Up - DiaCare AI{% endblock %}

{% block content %}
<div class="form-wrap">
    <h2>Create your account</h2>
    <p style="color:var(--muted); margin-top:-8px;">Save your predictions and download reports anytime.</p>

    <form method="POST" class="card">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ request.form.get('name', '') }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ request.form.get('email', '') }}" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-block">Sign Up</button>
    </form>

    <p style="text-align:center; margin-top:16px; font-size:14px;">
        Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>
{% endblock %}
